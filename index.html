<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joseon Maze</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; }

      #overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        background: radial-gradient(circle at 50% 40%, #1a1410 0%, #000 80%);
        color: #d8c7a0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        z-index: 10; cursor: pointer; transition: opacity 0.4s;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 { font-size: 38px; letter-spacing: 6px; font-weight: 700; }
      #overlay p { font-size: 15px; color: #9a8a68; line-height: 1.7; text-align: center; }
      #overlay .key { color: #d8c7a0; border: 1px solid #5a4a30; padding: 1px 7px; border-radius: 4px; }
      #overlay .start { margin-top: 8px; font-size: 16px; color: #c8a85a; animation: pulse 1.6s infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

      #hud {
        position: fixed; right: 16px; top: 14px; text-align: right;
        color: #b9a578; font-family: monospace; font-size: 12px;
        text-shadow: 0 0 6px #000; z-index: 5; pointer-events: none; line-height: 1.6;
      }
      #crosshair {
        position: fixed; left: 50%; top: 50%; width: 4px; height: 4px;
        margin: -2px 0 0 -2px; background: #c8a85a88; border-radius: 50%;
        z-index: 5; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair"></div>
    <div id="hud"></div>
    <div id="overlay">
      <h1>Joseon Maze</h1>
      <p class="intro">
        칠흑 같은 산속, 등불 하나에 의지해 미로를 빠져나가라.<br />
        <span class="key">W A S D</span> 이동 &nbsp; <span class="key">마우스</span> 시점 &nbsp; <span class="key">Shift</span> 달리기
      </p>
      <p class="start">화면을 클릭하여 시작</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
